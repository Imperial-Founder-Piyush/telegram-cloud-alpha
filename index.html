<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Cloud Alpha</title>
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<!-- 🔐 प्रोफेशनल लॉगइन और साइनअप पॉप-अप -->
<div id="authModal" class="modal-backdrop">
    <div class="modal-card">
        <div class="modal-logo">T</div>
        <h3 id="authTitle">सुरक्षित लॉगइन करें</h3>
        <p id="authDesc">अपना अकाउंट खोलें या नया अकाउंट बनाएं</p>
        
        <!-- इनपुट फील्ड्स -->
        <input type="email" id="authEmail" placeholder="आपकी ईमेल आईडी..." autocomplete="off">
        <input type="password" id="authPassword" placeholder="आपका पासवर्ड (कम से कम 6 अक्षर)..." autocomplete="off">
        
        <!-- ऐक्शन बटन्स -->
        <button id="loginBtn">लॉगइन करें</button>
        <button id="signupBtn" style="background: #4CAF50; margin-top: 8px;">नया अकाउंट बनाएं (Sign Up)</button>
    </div>
</div>

<!-- मुख्य चैट स्क्रीन (यह लॉगइन के बाद ही दिखेगी) -->
<div class="chat-container" id="chatContainer" style="display: none;">
    <div class="chat-header">
        <div class="header-info">
            <span class="chat-title">Telegram Cloud Alpha</span>
            <span class="chat-status" id="chatStatus">ऑनलाइन चैट रूम (0 लाइव)</span>
        </div>
        <div class="header-buttons">
            <!-- डार्क मोड टॉगल बटन -->
            <button id="themeToggleBtn" class="header-action-btn" title="थीम बदलें">☀️</button>
            <!-- पूरी चैट साफ़ करने का बटन -->
            <button id="clearChatBtn" class="header-action-btn" title="चैट साफ़ करें">
                <svg viewBox="0 0 24 24"><path d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 8,19V7H6V19Z"/></svg>
            </button>
        </div>
    </div>

    <!-- 🔍 सर्च और फ़िल्टर बार -->
    <div class="search-bar-container" style="padding: 8px 12px; background: rgba(0,0,0,0.05); display: flex; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.1);">
        <input type="text" id="searchFileInput" placeholder="🔍 मैसेज या फाइल का नाम खोजें..." style="width: 100%; padding: 8px 12px; border: none; border-radius: 20px; outline: none; font-size: 14px; background: var(--search-bg, #fff);">
    </div>
    
    <!-- मैसेजेस का डिब्बा -->
    <div class="messages-box" id="messagesBox"></div>

    <!-- सुंदर इन-बिल्ट इमोजी कीबोर्ड पैनल -->
    <div id="emojiPicker" class="emoji-picker hidden">
        <span class="emoji-item">😀</span><span class="emoji-item">😂</span><span class="emoji-item">🤣</span><span class="emoji-item">😊</span>
        <span class="emoji-item">😍</span><span class="emoji-item">😘</span><span class="emoji-item">😜</span><span class="emoji-item">😎</span>
        <span class="emoji-item">👍</span><span class="emoji-item">🔥</span><span class="emoji-item">💯</span><span class="emoji-item">👏</span>
        <span class="emoji-item">❤️</span><span class="emoji-item">🎉</span><span class="emoji-item">🚀</span><span class="emoji-item">✨</span>
        <span class="emoji-item">🙏</span><span class="emoji-item">👑</span><span class="emoji-item">💀</span><span class="emoji-item">🧠</span>
    </div>
    
    <!-- इनपुट एरिया -->
    <div class="input-area">
        <input type="file" id="imageInput" accept="*" style="display: none;">
        
        <button id="attachBtn" class="input-action-btn" title="फाइल अपलोड करें">
            <svg viewBox="0 0 24 24"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg>
        </button>

        <button id="emojiBtn" class="input-action-btn" title="इमोजी चुनें">😊</button>
        <input type="text" id="messageInput" placeholder="एक संदेश लिखें..." autocomplete="off">
        
        <button id="sendBtn">
            <svg viewBox="0 0 24 24"><path d="M2,21L23,12L2,3V10L17,12L2,14V21Z"/></svg>
        </button>
    </div>
</div>

<script src="./script.js"></script>
</body>
        </html>
